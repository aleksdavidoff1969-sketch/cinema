{% extends "cinema_site/base.html" %}
{% block content %}
 <p><a href="{% url 'cinema_site:film' film.id %}">{{ film.name }}</a></p>
 <p>Максимальное количество загружаемых видео: 3</p>
  <p>Добавьте изображение:</p>
 <form action="{% url 'cinema_site:new_video_film' film.id %}" method='post' enctype="multipart/form-data">
 {% csrf_token %}
 {{ form.as_p }}
 <button name='submit'>Добавить видео</button>
 </form>
{% endblock content %}
