{% extends "cinema_site/base.html" %}
{% block page_header %}
 <div class="p-3 mb-4 bg-light border rounded-3">
 	<div class="container-fluid py-4">
 		<h5 class="display-3">Сайт с информацией о фильмах и сериалах</h5>
 		<div class="flip-card">
    	<input type="checkbox" id="flipCheckbox" class="flip-checkbox">
    	<label for="flipCheckbox" class="flip-card-inner">
        <div class="card front">Нажмите для просмотра</div>
        <div class="card back">Добавляйте информацию о новых фильмах и сериалах.</div>
    	</label>
		</div>
 		<a class="btn btn-primary btn-lg mt-1"
 			href="{% url 'accounts:register' %}">Регистрация &raquo;</a>
 	</div>
 </div>
{% endblock page_header %}
