{% extends "cinema_site/base.html" %}
{% block content %}
 <p><a href="{% url 'cinema_site:serial' serial.id %}">{{ serial.name }}</a></p>
 <p>Максимальное количество загружаемых изображений: 3</p>
  <p>Добавьте изображение:</p>

 {% csrf_token %}
 {{ form.as_p }}
 <button name='submit'>Добавить изображение</button>
 </form>
{% endblock content %}
