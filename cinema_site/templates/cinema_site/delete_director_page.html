{% extends 'cinema_site/base.html' %}
{% block content %}
<h3>Удаление страницы с режиссером</h3>
<p>Вы действительно хотите удалить страницу с режиссером <strong>{{ director.last_name }} {{ director.first_name }}</strong>?</p>
<a href="{% url 'cinema_site:director' director.id %}">
</a>
<form method="POST">
  {% csrf_token %}
  <div>
    <button type="submit">Да, удалить</button>
  </div>
</form>
<br>
<a href="{% url 'cinema_site:director' director.id %}">
  ← Отмена, вернуться на страницу с режиссером
</a>
{% endblock content %}
